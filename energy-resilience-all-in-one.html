const fv=(v,u)=>v==null?"—":u==="hrs"?(v>=999?"999+":v.toFixed(1)):v>=1000?(v/1000).toFixed(1)+"k":v.toLocaleString();

const DEFAULT_APPS=[

  {id:"washer",name:"Washer",w:500,s:1000,h:1,p:"Optional",cat:"Other",m:true},

];

const ZONES=[
  {id:"us_temp",name:"US Temperate",desc:"Ohio Valley-like",psh:4.5,tmp:12,rng:[-5,30]},
  {id:"us_sw",name:"US Southwest",desc:"Arizona/Nevada",psh:6.5,tmp:24,rng:[5,42]},
  {id:"us_ne",name:"US Northeast",desc:"New England",psh:4.0,tmp:10,rng:[-10,28]},
  {id:"us_se",name:"US Southeast",desc:"Florida/Georgia",psh:5.0,tmp:19,rng:[5,35]},
  {id:"us_nw",name:"US Northwest",desc:"Pacific NW",psh:3.5,tmp:11,rng:[0,25]},
  {id:"us_mtn",name:"US Mountain",desc:"Colorado/Utah",psh:5.5,tmp:8,rng:[-15,32]}
];

// Phase 2: Enhanced chemistry with Peukert, C-rate, calendar aging, temp slope
const CHEM={
  lfp:{id:"lfp",name:"Lithium (LFP)",dod:0.92,rte:0.95,l80:4500,l50:6000,peukert:1.05,cr:0.5,calFade:0.02,tempSlope:0.008},
  lead:{id:"lead",name:"Lead-Acid",dod:0.50,rte:0.82,l80:200,l50:400,peukert:1.25,cr:0.2,calFade:0.05,tempSlope:0.012}
};

// Phase 2: Enhanced tilt lookup with 15° increments and interpolation
const TL={"S_0":0.85,"S_15":0.93,"S_30":1.0,"S_45":0.98,"S_60":0.93,"S_75":0.86,"S_90":0.70,"SE_0":0.82,"SE_15":0.87,"SE_30":0.92,"SE_45":0.90,"SE_60":0.85,"SE_75":0.78,"SE_90":0.65,"SW_0":0.82,"SW_15":0.87,"SW_30":0.92,"SW_45":0.90,"SW_60":0.85,"SW_75":0.78,"SW_90":0.65,"E_0":0.78,"E_15":0.82,"E_30":0.85,"E_45":0.80,"E_60":0.74,"E_75":0.68,"E_90":0.65,"W_0":0.78,"W_15":0.82,"W_30":0.85,"W_45":0.80,"W_60":0.74,"W_75":0.68,"W_90":0.65,"N_0":0.60,"N_15":0.58,"N_30":0.65,"N_45":0.55,"N_60":0.48,"N_75":0.42,"N_90":0.50};
const tiltD=(o,t)=>{
  const bp=[0,15,30,45,60,75,90];
  let li=0,hi=bp.length-1;
  for(let i=0;i<bp.length-1;i++){if(t>=bp[i]&&t<=bp[i+1]){li=i;hi=i+1;break;}}
  const t0=bp[li],t1=bp[hi];
  const d0=TL[o+"_"+t0]||0.85,d1=TL[o+"_"+t1]||0.85;
  return t0===t1?d0:d0+(d1-d0)*(t-t0)/(t1-t0);
};

// Phase 2: NOCT-based cell temperature model
const cellTemp=(amb,irr=800,noct=45)=>amb+(noct-20)/800*irr;
const tempD=(amb,irr=800,noct=45,tc=-0.0038)=>{
  const ct=cellTemp(amb,irr,noct);
  return Math.max(0,1+tc*Math.max(0,ct-25));
};

// Phase 2: Named sub-derates (multiply to ~0.86)
const SUB_DERATES={wiring:0.98,soiling:0.98,mismatch:0.98,availability:0.97,degradation:0.9985};

const arrPow=(n,w,td,od,sub)=>{
  const sd=sub||SUB_DERATES;
  const total=Object.values(sd).reduce((a,v)=>a*v,1);
  return n*w*td*od*total;
};
const arrPowLegacy=(n,w,td,od)=>n*w*td*od*0.86;

// Phase 2: Seasonal multiplier
const SEASON_M={winter:0.65,spring:0.85,summer:1.0,fall:0.80};
const seasonalPSH=(base,season)=>base*(SEASON_M[season]||1);

// Phase 2: Cloud attenuation (Beta-distributed)
const CLOUD={clear:{a:2,b:8},typical:{a:3,b:6},poor:{a:3,b:3}};
function sampleBeta(a,b){let x,y;do{x=Math.pow(Math.random(),1/a);y=Math.pow(Math.random(),1/b);}while(x+y>1);return x/(x+y);}
const cloudAtten=(val,scenario)=>{const p=CLOUD[scenario]||CLOUD.typical;return val*(1-sampleBeta(p.a,p.b));};

// Phase 2: Seasonal daylight hours
const seasonDaylight=(season)=>{
  const adj={winter:-1.5,spring:0,summer:1.5,fall:0};
  const a=adj[season]||0;
  return{sunrise:Math.max(4,Math.min(8,6-a)),sunset:Math.max(16,Math.min(20,18+a))};
};

const daySolar=(p,psh)=>p*psh;
const solarCurve=(tot,sunrise=6,sunset=20)=>{
  const o=new Array(24).fill(0);
  const dl=sunset-sunrise;
  if(dl<=0||tot<=0)return o;
  const pk=tot/(dl*Math.PI/2);
  for(let h=0;h<24;h++){
    if(h>=sunrise&&h<=sunset){
      const t=(h-sunrise)/dl;
      o[h]=pk*Math.pow(Math.sin(Math.PI*t),2);
    }
  }
  return o;
};

const totalL=a=>a.reduce((s,x)=>s+x.w,0);
const peakL=a=>{const r=totalL(a);const mt=a.filter(x=>x.m);return r+(mt.length?Math.max(...mt.map(x=>x.s-x.w)):0)};
const dailyD=a=>a.reduce((s,x)=>s+x.w*x.h,0);
const byP=a=>{const d={Critical:0,Important:0,Optional:0};a.forEach(x=>{d[x.p]=(d[x.p]||0)+x.w*x.h});return d};
const byC=a=>{const b={};a.forEach(x=>{(b[x.cat]=b[x.cat]||0)+x.w*x.h});return b};

// Phase 2: Peukert-adjusted capacity
const peukertCap=(rated,loadW,volt=48,k=1.05)=>{
  const iRated=(rated*1000)/(volt*20);
  const iActual=loadW/volt;
  if(iActual<=0||iRated<=0)return rated;
  return rated*Math.max(0.5,Math.min(1.5,Math.pow(iRated/iActual,k-1)));
};

// Phase 2: Battery temp derate
const batTempDerate=(amb,slope=0.008,ref=25)=>amb>=ref?1:Math.max(0.5,1-slope*(ref-amb));

// Phase 2: C-rate limit in watts
const cRateW=(capKwh,cr)=>cr*capKwh*1000;

// Phase 2: Enhanced SOC with Peukert, C-rate, temp
const simSOC=({cap,nameplate,dod,rte,solar,load,hrs,volt=48,peukertK=1.05,crCh=0.5,crDis=0.5,ambTemp=25,tempSlope=0.008,usePeukert=true,useCRate=true,useTemp=true})=>{
  const r={soc:[],chg:0,dis:0,dep:null,unmet:0,peukCap:[]};
  const npt=nameplate||cap/dod;
  const tempD=useTemp?batTempDerate(ambTemp,tempSlope):1;
  const effCap=cap*tempD;
  let soc=effCap;
  const maxCh=useCRate?cRateW(npt,crCh):Infinity;
  const maxDis=useCRate?cRateW(npt,crDis):Infinity;
  for(let h=0;h<hrs;h++){
    const hod=h%24;
    const s=solar[hod]||0;
    const l=load[hod]||0;
    const net=s-l;
    let curCap=effCap;
    if(usePeukert&&l>0)curCap=peukertCap(npt,l,volt,peukertK)*tempD;
    const mn=curCap*(1-dod);
    let chgWh=0,disWh=0,unmet=0;
    if(net>0){
      const into=net*rte;
      const chW=Math.min(maxCh,into);
      const chK=Math.min(chW/1000,curCap-soc);
      soc+=Math.max(0,chK);chgWh=Math.max(0,chK)*1000;
      if(into>maxCh)unmet=into-maxCh;
    }else{
      const def=Math.abs(net);
      const disW=Math.min(maxDis,def);
      const disK=Math.min(disW/1000,soc-mn);
      soc-=Math.max(0,disK);disWh=Math.max(0,disK)*1000;
      if(def>maxDis)unmet=def-maxDis;
    }
    soc=Math.max(mn,Math.min(curCap,soc));
    r.soc.push(soc);r.chg+=chgWh;r.dis+=disWh;r.unmet+=unmet;r.peukCap.push(curCap);
    if(soc<=mn+0.01&&r.dep===null){
      let sus=true;
      for(let f=h+1;f<Math.min(h+24,hrs);f++){
        if((solar[f%24]||0)>=(load[f%24]||0)){sus=false;break;}
      }
      if(sus)r.dep=h+1;
    }
  }
  if(r.dep===null)r.dep=hrs;
  r.physics={tempD,effCap,maxCh,maxDis};
  return r;
};

// Phase 2: Enhanced degradation with calendar aging
const degrad=(dis,cap,cid,dod,bpy,yrs=10)=>{
  const c=CHEM[cid]||CHEM.lfp;
  const cpe=dis/(cap*1000);
  let life=dod>=0.8?c.l80:dod<=0.5?c.l50:c.l50+((dod-0.5)/0.3)*(c.l80-c.l50);
  const cpy=cpe*bpy;
  const proj=[];
  let ret=1;
  for(let y=0;y<=yrs;y++){
    const cycleFade=cpy/life;
    const calFade=c.calFade;
    ret*=(1-cycleFade)*(1-calFade);
    const r=Math.max(0.3,ret);
    proj.push({year:y,ret:r,cap:cap*r});
  }
  const y80=proj.find(p=>p.ret<=0.8)?.year||yrs;
  const y50=proj.find(p=>p.ret<=0.5)?.year||yrs;
  return{cpe,life,cpy,yrs:life/cpy,calFade:c.calFade,y80,y50,proj};
};

// Phase 2: Cost calculation
const calcCost=(panels,pw,batKwh,cfg)=>{
  const sCost=cfg.solarPerW||2.75;
  const bCost=cfg.batPerKwh||900;
  const bos=cfg.bosPct||17.5;
  const solar=panels*pw*sCost;
  const battery=batKwh*bCost;
  const sub=solar+battery;
  return{solar,battery,bos:sub*bos/100,total:sub+sub*bos/100};
};
const estSurvival=(panels,pw,batKwh,cfg)=>{
  const avgW=cfg.avgLoad||500;
  const solarWh=panels*pw*4.5*0.86;
  const batH=(batKwh*1000)/avgW;
  const solH=solarWh/avgW;
  return Math.min(batH+solH*0.3,200);
};

const runSim=cfg=>{
  const{apps,solar:s,battery:b,zone:z,hrs,bpy,adv}=cfg;
  const tL=totalL(apps),pL=peakL(apps),dD=dailyD(apps),bP=byP(apps),bC=byC(apps);
  const season=adv.season||"summer";
  const cloud=adv.cloud||"typical";
  const noct=adv.noct||45;
  const tc=adv.tc||-0.0038;
  const invEff=adv.invEff||0.95;
  const useAdv=adv.useAdv||false;
  const subDr=adv.subDr||null;
  const td=tempD(z.tmp,800,noct,tc);
  const od=tiltD(s.ori,s.tilt);
  let ap;
  if(useAdv&&subDr)ap=arrPow(s.cnt,s.w,td,od,subDr);
  else ap=arrPowLegacy(s.cnt,s.w,td,od);
  const adjPSH=seasonalPSH(z.psh,season);
  let ds=daySolar(ap,adjPSH);
  ds=cloudAtten(ds,cloud);
  const dl=seasonDaylight(season);
  let sc=solarCurve(ds,dl.sunrise,dl.sunset);
  sc=sc.map(w=>w*invEff);
  const ch=CHEM[b.chem]||CHEM.lfp;
  const us=b.cap*b.dod;
  const lp=new Array(24).fill(dD/24);
  const socCfg={cap:us,nameplate:b.cap,dod:b.dod,rte:b.rte,solar:sc,load:lp,hrs:hrs,
    peukertK:ch.peukert,crCh:ch.cr,crDis:ch.cr,ambTemp:z.tmp,tempSlope:ch.tempSlope,
    usePeukert:adv.usePeukert!==false,useCRate:adv.useCRate!==false,useTemp:adv.useTemp!==false};
  const al=simSOC(socCfg);
  const ca=apps.filter(a=>a.p==="Critical"),cd=dailyD(ca),cl2=new Array(24).fill(cd/24);
  const cl=simSOC({...socCfg,load:cl2});
  const dg=degrad(al.dis,us,b.chem,b.dod,bpy);
  return{tL,pL,dD,bP,bC,ap,ds,sc,td,od,us,ch,al,cl,dg,cfg:{apps,solar:s,battery:b,zone:z,hrs,bpy},season,cloud,adjPSH};
};

function LoadsForm({cfg,set}){
  const[showA,setShowA]=useState(false);
  const[nw,setNw]=useState({n:"",w:"",s:"",h:"",p:"Optional",c:"Other"});
  const sel=cfg.apps;
  const tog=id=>{const a=DEFAULT_APPS.find(x=>x.id===id);set({...cfg,apps:sel.some(x=>x.id===id)?sel.filter(x=>x.id!==id):[...sel,a]})};
  const rm=id=>set({...cfg,apps:sel.filter(x=>x.id!==id)});

    set({...cfg,apps:[...sel,{id:"c"+Date.now(),n:nw.n,w:+nw.w,s:+nw.s||+nw.w,h:+nw.h,p:nw.p,cat:nw.c,m:(+nw.s||0)>+nw.w*1.5}]});
    setNw({n:"",w:"",s:"",h:"",p:"Optional",c:"Other"});
    setShowA(false);
  };
  const grp=DEFAULT_APPS.reduce((a,x)=>{(a[x.cat]=a[x.cat]||[]).push(x);return a},{});
  return React.createElement("div",{className:"space-y-5"},
    React.createElement("div",null,
      React.createElement("h3",{className:"text-lg font-semibold text-gray-900"},"Electrical Loads"),
      React.createElement("p",{className:"text-sm text-gray-600 mt-1"},"Select appliances for simulation.")
    ),
    React.createElement("div",{className:"p-3 bg-gray-50 rounded-lg"},
      React.createElement("div",{className:"flex justify-between mb-2"},
        React.createElement("span",{className:"text-sm font-medium"},"Selected: "+sel.length)
      ),
      React.createElement("div",{className:"flex flex-wrap gap-1"},
        sel.length===0&&React.createElement("span",{className:"text-xs text-gray-400"},"None"),

    return{path:"M"+cx+","+cy+" L"+x1+","+y1+" A"+r+","+r+" 0 "+large+" 1 "+x2+","+y2+" Z",color:s.color};
