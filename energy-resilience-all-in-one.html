];

const CHEM={
  lfp:{id:"lfp",name:"Lithium (LFP)",dod:0.92,rte:0.95,l80:4500,l50:6000},
  lead:{id:"lead",name:"Lead-Acid",dod:0.50,rte:0.82,l80:200,l50:400}
};

const TL={"S_30":1,"S_0":0.85,"S_45":0.95,"SE_30":0.92,"SE_0":0.82,"SW_30":0.92,"SW_0":0.82,"E_30":0.85,"E_0":0.78,"W_30":0.85,"W_0":0.78,"N_30":0.65,"N_0":0.6};
const tiltD=(o,t)=>{const k=t<=10?"0":t<=37?"30":t<=67?"45":"90";return TL[o+"_"+k]||0.85};
const tempD=t=>1-0.004*Math.max(0,t+20-25);
const arrPow=(n,w,td,od)=>n*w*td*od*0.86;
const daySolar=(p,psh)=>p*psh;
const solarCurve=(tot)=>{
  const o=new Array(24).fill(0);
  const rise=6,set=20,dl=set-rise;
  const pk=tot/(dl*0.6366);
  for(let h=0;h<24;h++){
    if(h>=rise&&h<=set){
      const t=(h-rise)/dl;
      o[h]=pk*Math.pow(Math.sin(Math.PI*t),2);
    }
  }
  return o;
};
const totalL=a=>a.reduce((s,x)=>s+x.w,0);
const peakL=a=>{const r=totalL(a);const mt=a.filter(x=>x.m);return r+(mt.length?Math.max(...mt.map(x=>x.s-x.w)):0)};
const dailyD=a=>a.reduce((s,x)=>s+x.w*x.h,0);
const byP=a=>{const d={Critical:0,Important:0,Optional:0};a.forEach(x=>{d[x.p]=(d[x.p]||0)+x.w*x.h});return d};
const byC=a=>{const b={};a.forEach(x=>{(b[x.cat]=b[x.cat]||0)+x.w*x.h});return b};

const simSOC=({cap,dod,rte,solar,load,hrs})=>{
  const r={soc:[],chg:0,dis:0,dep:null};
  let soc=cap;const mn=cap*(1-dod);
  for(let h=0;h<hrs;h++){
    const hod=h%24;
    const s=solar[hod]||0;
    const l=load[hod]||0;
    const net=s-l;
    if(net>0){
      const ch=Math.min(net*rte/1000,cap-soc);
      soc+=ch;r.chg+=ch*1000;
    }else{
      const d=Math.min(Math.abs(net)/1000,soc-mn);
      soc-=d;r.dis+=d*1000;
    }
    soc=Math.max(mn,Math.min(cap,soc));
    r.soc.push(soc);
    if(soc<=mn+0.01&&r.dep===null){
      let sus=true;
      for(let f=h+1;f<Math.min(h+24,hrs);f++){
        if((solar[f%24]||0)>=(load[f%24]||0)){sus=false;break}
      }
      if(sus)r.dep=h+1;
    }
  }
  if(r.dep===null)r.dep=hrs;
  return r;
};

const degrad=(dis,cap,cid,dod,bpy)=>{
  const c=CHEM[cid]||CHEM.lfp;
  const cpe=dis/(cap*1000);
  let life=dod>=0.8?c.l80:dod<=0.5?c.l50:c.l50+((dod-0.5)/0.3)*(c.l80-c.l50);
  return{cpe,life,cpy:cpe*bpy,yrs:life/(cpe*bpy)};
};

const runSim=cfg=>{
  const{apps,solar:s,battery:b,zone:z,hrs,bpy}=cfg;
  const tL=totalL(apps),pL=peakL(apps),dD=dailyD(apps),bP=byP(apps),bC=byC(apps);
  const td=tempD(z.tmp),od=tiltD(s.ori,s.tilt),ap=arrPow(s.cnt,s.w,td,od);
  const ds=daySolar(ap,z.psh),sc=solarCurve(ds);
  const ch=CHEM[b.chem]||CHEM.lfp,us=b.cap*b.dod;
  const lp=new Array(24).fill(dD/24);
  const al=simSOC({cap:us,dod:b.dod,rte:b.rte,solar:sc,load:lp,hrs});
  const ca=apps.filter(a=>a.p==="Critical"),cd=dailyD(ca),cl2=new Array(24).fill(cd/24);
  const cl=simSOC({cap:us,dod:b.dod,rte:b.rte,solar:sc,load:cl2,hrs});
  const dg=degrad(al.dis,us,b.chem,b.dod,bpy);
  return{tL,pL,dD,bP,bC,ap,ds,sc,td,od,us,ch,al,cl,dg,cfg:{apps,solar:s,battery:b,zone:z,hrs,bpy}};
};
