const tiltD=(o,t)=>{
  const bp=[0,15,30,45,60,75,90];
  let li=0,hi=bp.length-1;
  for(let i=0;i<bp.length-1;i++){if(t>=bp[i]&&t<=bp[i+1]){li=i;hi=i+1;break;}}
  const t0=bp[li],t1=bp[hi];
  const d0=TL[o+"_"+t0]||0.85,d1=TL[o+"_"+t1]||0.85;
  return t0===t1?d0:d0+(d1-d0)*(t-t0)/(t1-t0);
};

const cellTemp=(amb,irr=800,noct=45)=>amb+(noct-20)/800*irr;
const tempD=(amb,irr=800,noct=45,tc=-0.0038)=>{
  const ct=cellTemp(amb,irr,noct);
  return Math.max(0,1+tc*Math.max(0,ct-25));
};

const SUB_DERATES={wiring:0.98,soiling:0.98,mismatch:0.98,availability:0.97,degradation:0.9985};

const arrPow=(n,w,td,od,sub)=>{
  const sd=sub||SUB_DERATES;
  const total=Object.values(sd).reduce((a,v)=>a*v,1);
  return n*w*td*od*total;
};
const arrPowLegacy=(n,w,td,od)=>n*w*td*od*0.86;

const SEASON_M={winter:0.65,spring:0.85,summer:1.0,fall:0.80};
const seasonalPSH=(base,season)=>base*(SEASON_M[season]||1);

const CLOUD={clear:{a:2,b:8},typical:{a:3,b:6},poor:{a:3,b:3}};
function sampleBeta(a,b){let x,y;do{x=Math.pow(Math.random(),1/a);y=Math.pow(Math.random(),1/b);}while(x+y>1);return x/(x+y);}
const cloudAtten=(val,scenario)=>{const p=CLOUD[scenario]||CLOUD.typical;return val*(1-sampleBeta(p.a,p.b));};

const seasonDaylight=(season)=>{
  const adj={winter:-1.5,spring:0,summer:1.5,fall:0};
  const a=adj[season]||0;
  return{sunrise:Math.max(4,Math.min(8,6-a)),sunset:Math.max(16,Math.min(20,18+a))};
};

const daySolar=(p,psh)=>p*psh;
const solarCurve=(tot,sunrise=6,sunset=20)=>{
  const o=new Array(24).fill(0);
  const dl=sunset-sunrise;
  if(dl<=0||tot<=0)return o;
  const pk=tot/(dl*Math.PI/2);
  for(let h=0;h<24;h++){
    if(h>=sunrise&&h<=sunset){
      const t=(h-sunrise)/dl;
      o[h]=pk*Math.pow(Math.sin(Math.PI*t),2);
    }
  }
  return o;
};

const totalL=a=>a.reduce((s,x)=>s+x.w,0);
const peakL=a=>{const r=totalL(a);const mt=a.filter(x=>x.m);return r+(mt.length?Math.max(...mt.map(x=>x.s-x.w)):0)};
const dailyD=a=>a.reduce((s,x)=>s+x.w*x.h,0);
const byP=a=>{const d={Critical:0,Important:0,Optional:0};a.forEach(x=>{d[x.p]=(d[x.p]||0)+x.w*x.h});return d};
const byC=a=>{const b={};a.forEach(x=>{(b[x.cat]=b[x.cat]||0)+x.w*x.h});return b};

const peukertCap=(rated,loadW,volt=48,k=1.05)=>{
  const iRated=(rated*1000)/(volt*20);
  const iActual=loadW/volt;
  if(iActual<=0||iRated<=0)return rated;
  return rated*Math.max(0.5,Math.min(1.5,Math.pow(iRated/iActual,k-1)));
};

const batTempDerate=(amb,slope=0.008,ref=25)=>amb>=ref?1:Math.max(0.5,1-slope*(ref-amb));

const cRateW=(capKwh,cr)=>cr*capKwh*1000;

const simSOC=({cap,nameplate,dod,rte,solar,load,hrs,volt=48,peukertK=1.05,crCh=0.5,crDis=0.5,ambTemp=25,tempSlope=0.008,usePeukert=true,useCRate=true,useTemp=true})=>{
  const r={soc:[],chg:0,dis:0,dep:null,unmet:0,peukCap:[]};
  const npt=nameplate||cap/dod;
  const tempD=useTemp?batTempDerate(ambTemp,tempSlope):1;
  const effCap=cap*tempD;
  let soc=effCap;
  const maxCh=useCRate?cRateW(npt,crCh):Infinity;
  const maxDis=useCRate?cRateW(npt,crDis):Infinity;
  for(let h=0;h<hrs;h++){
    const hod=h%24;
    const s=solar[hod]||0;
    const l=load[hod]||0;
    const net=s-l;
    let curCap=effCap;
    if(usePeukert&&l>0)curCap=peukertCap(npt,l,volt,peukertK)*tempD;
    const mn=curCap*(1-dod);
    let chgWh=0,disWh=0,unmet=0;
    if(net>0){
      const into=net*rte;
      const chW=Math.min(maxCh,into);
      const chK=Math.min(chW/1000,curCap-soc);
      soc+=Math.max(0,chK);chgWh=Math.max(0,chK)*1000;
      if(into>maxCh)unmet=into-maxCh;
    }else{
      const def=Math.abs(net);
      const disW=Math.min(maxDis,def);
      const disK=Math.min(disW/1000,soc-mn);
      soc-=Math.max(0,disK);disWh=Math.max(0,disK)*1000;
      if(def>maxDis)unmet=def-maxDis;
    }
    soc=Math.max(mn,Math.min(curCap,soc));
    r.soc.push(soc);r.chg+=chgWh;r.dis+=disWh;r.unmet+=unmet;r.peukCap.push(curCap);
    if(soc<=mn+0.01&&r.dep===null){
      let sus=true;
      for(let f=h+1;f<Math.min(h+24,hrs);f++){
        if((solar[f%24]||0)>=(load[f%24]||0)){sus=false;break;}
      }
      if(sus)r.dep=h+1;
    }
  }
  if(r.dep===null)r.dep=hrs;
  r.physics={tempD,effCap,maxCh,maxDis};
  return r;
};

const degrad=(dis,cap,cid,dod,bpy,yrs=10)=>{
  const c=CHEM[cid]||CHEM.lfp;
  const cpe=dis/(cap*1000);
  let life=dod>=0.8?c.l80:dod<=0.5?c.l50:c.l50+((dod-0.5)/0.3)*(c.l80-c.l50);
  const cpy=cpe*bpy;
  const proj=[];
  let ret=1;
  for(let y=0;y<=yrs;y++){
    const cycleFade=cpy/life;
    const calFade=c.calFade;
    ret*=(1-cycleFade)*(1-calFade);
    const r=Math.max(0.3,ret);
    proj.push({year:y,ret:r,cap:cap*r});
  }
  const y80=proj.find(p=>p.ret<=0.8)?.year||yrs;
  const y50=proj.find(p=>p.ret<=0.5)?.year||yrs;
  return{cpe,life,cpy,yrs:life/cpy,calFade:c.calFade,y80,y50,proj};
};

const calcCost=(panels,pw,batKwh,cfg)=>{
  const sCost=cfg.solarPerW||27.5;
  const bCost=cfg.batPerKwh||4000;
  const bos=cfg.bosPct||17.5;
  const solar=panels*pw*sCost;
  const battery=batKwh*bCost;
  const sub=solar+battery;
  return{solar,battery,bos:sub*bos/100,total:sub+sub*bos/100};
};
const estSurvival=(panels,pw,batKwh,cfg)=>{
  const avgW=cfg.avgLoad||500;
  const solarWh=panels*pw*4.5*0.86;
  const batH=(batKwh*1000)/avgW;
  const solH=solarWh/avgW;
  return Math.min(batH+solH*0.3,200);
};

const ORIS=["S","SE","SW","E","W","N"];
const CHEMS=["lfp","lead"];

const dominates=(a,b)=>{
  let dominated=false;
  for(let i=0;i<a.obj.length;i++){
    if(a.obj[i]>b.obj[i])return false;
    if(a.obj[i]<b.obj[i])dominated=true;
  }
  return dominated;
};

const fastNonDominatedSort=(pop)=>{
  const n=pop.length;
  const S=Array.from({length:n},()=>[]);
  const nDom=new Array(n).fill(0);
  const fronts=[[]];
  for(let i=0;i<n;i++){
    for(let j=0;j<n;j++){
      if(i===j)continue;
      if(dominates(pop[i],pop[j]))S[i].push(j);
      else if(dominates(pop[j],pop[i]))nDom[i]++;
    }
    if(nDom[i]===0){pop[i].rank=0;fronts[0].push(i);}
  }
  let fi=0;
  while(fronts[fi].length>0){
    const Q=[];
    for(const i of fronts[fi]){
      for(const j of S[i]){
        nDom[j]--;
        if(nDom[j]===0){pop[j].rank=fi+1;Q.push(j);}
      }
    }
    fi++;
    fronts.push(Q);
  }
  return fronts.filter(f=>f.length>0);
};

const crowdingDistance=(pop,front)=>{
  const n=front.length;
  if(n<=2){front.forEach(i=>{pop[i].cd=Infinity;});return;}
  front.forEach(i=>{pop[i].cd=0;});
  const nObj=pop[front[0]].obj.length;
  for(let m=0;m<nObj;m++){
    const sorted=[...front].sort((a,b)=>pop[a].obj[m]-pop[b].obj[m]);
    pop[sorted[0]].cd=Infinity;
    pop[sorted[n-1]].cd=Infinity;
    const minV=pop[sorted[0]].obj[m];
    const maxV=pop[sorted[n-1]].obj[m];
    const range=maxV-minV||1;
    for(let i=1;i<n-1;i++){
      pop[sorted[i]].cd+=(pop[sorted[i+1]].obj[m]-pop[sorted[i-1]].obj[m])/range;
    }
  }
};

const tournamentSelect=(pop)=>{
  const a=Math.floor(Math.random()*pop.length);
  let b=Math.floor(Math.random()*pop.length);
  while(b===a)b=Math.floor(Math.random()*pop.length);
  const pa=pop[a],pb=pop[b];
  if(pa.rank<pb.rank)return a;
  if(pb.rank<pa.rank)return b;
  return pa.cd>=pb.cd?a:b;
};

const sbx=(a,b,eta=20)=>{
  if(Math.abs(a-b)<1e-10)return a;
  const u=Math.random();
  let beta;
  if(u<=0.5)beta=Math.pow(2*u,1/(eta+1));
  else beta=Math.pow(1/(2*(1-u)),1/(eta+1));
  return 0.5*((1+beta)*a+(1-beta)*b);
};

const polyMut=(val,lb,ub,eta=20)=>{
  const u=Math.random();
  if(u<1/(ub-lb+1)){
    const delta=Math.min(val-lb,ub-val)/(ub-lb);
    const r=Math.random();
    const d=Math.pow(r,eta+1);
    if(r<0.5)return val-(ub-lb)*d*delta;
    return val+(ub-lb)*d*delta;
  }
  return val;
};

const initPopulation=(popSize)=>{
  const pop=[];
  for(let i=0;i<popSize;i++){
    pop.push({
      panelCount:Math.floor(Math.random()*41),
      batteryKwh:Math.round(Math.random()*80)/2,
      batteryChem:CHEMS[Math.floor(Math.random()*2)],
      tilt:Math.floor(Math.random()*91),
      orientation:ORIS[Math.floor(Math.random()*6)]
    });
  }
  return pop;
};

const evaluateIndividual=(ind,fixedCfg)=>{
  const{panelCount,batteryKwh,batteryChem,tilt,orientation}=ind;
  const{apps,zone,hrs,bpy,adv,costCfg,panelWatts}=fixedCfg;
  const solar={cnt:panelCount,w:panelWatts,tilt,ori:orientation};
  const dod=batteryChem==='lfp'?0.92:0.50;
  const rte=batteryChem==='lfp'?0.95:0.82;
  const battery={cap:batteryKwh,chem:batteryChem,dod,rte};
  const simCfg={apps,solar,battery,zone,hrs,bpy,adv};
  let res;
  try{res=runSim(simCfg);}catch(e){return{cost:1e9,reliability:0,carbon:1e9,survival:0};}
  const cost=calcCost(panelCount,panelWatts,batteryKwh,costCfg).total;
  const survival=Math.min(res.al.dep,hrs*1.5);
  const N=20;
  let survived=0;
  const ca=apps.filter(a=>a.p==="Critical");
  const critDaily=ca.reduce((s,a)=>s+a.w*a.h,0);
  const critLoad=Array(24).fill(critDaily/24);
  for(let i=0;i<N;i++){
    const cloudScenarios=["clear","typical","poor"];
    const randCloud=cloudScenarios[Math.floor(Math.random()*3)];
    const randStart=Math.floor(Math.random()*24);
    const adjPSH=seasonalPSH(zone.psh,adv.season||"summer");
    const td2=tempD(zone.tmp,800,adv.noct||45,adv.tc||-0.0038);
    const od2=tiltD(orientation,tilt);
    const ap2=arrPow(panelCount,panelWatts,td2,od2);
    let ds2=daySolar(ap2,adjPSH);
    ds2=cloudAtten(ds2,randCloud);
    const dl2=seasonDaylight(adv.season||"summer");
    let sc2=solarCurve(ds2,dl2.sunrise,dl2.sunset);
    sc2=sc2.map(w=>w*(adv.invEff||0.95));
    const rotated=Array(24).fill(0);
    for(let h=0;h<24;h++)rotated[h]=sc2[(h+randStart)%24];
    const ch2=CHEM[batteryChem]||CHEM.lfp;
    const us2=batteryKwh*dod;
    const socCfg={cap:us2,nameplate:batteryKwh,dod,rte,solar:rotated,load:critLoad,hrs,
      peukertK:ch2.peukert,crCh:ch2.cr,crDis:ch2.cr,
      ambTemp:zone.tmp,tempSlope:ch2.tempSlope,
      usePeukert:adv.usePeukert!==false,useCRate:adv.useCRate!==false,useTemp:adv.useTemp!==false};
    try{const sr=simSOC(socCfg);if(sr.dep>=hrs)survived++;}catch(e){}
  }
  const dailySolarKwh=res.ds/1000;
  const annualCarbonAvoided=dailySolarKwh*365*zone.gridCarbon;
  const mfgCarbon=panelCount*40+batteryKwh*75;
  const carbon=mfgCarbon-annualCarbonAvoided*10;
  return{cost,reliability:survived/N,carbon,survival};
};

const buildObjective=(ev)=>[ev.cost,-ev.reliability,ev.carbon,-ev.survival];

const generateRecommendations=(res)=>{
  const recs=[];
  if(!res||!res.cfg||!res.cfg.apps||!res.cfg.apps.length)return recs;
  const rCfg=res.cfg;
  const hrs=rCfg.hrs||72;
  const apps=rCfg.apps;
  const dD=res.dD;
  const ds=res.ds;
  if(dD<=0||hrs<=0)return recs;
  const loadH=Array(24).fill(dD/24);
  const costCfg={solarPerW:27.5,batPerKwh:4000,bosPct:17.5};
  const deficitByH=loadH.map((l,h)=>Math.max(0,l-(res.sc[h]||0)));
  const deficitHours=[];
  for(let h=0;h<24;h++){if(deficitByH[h]>0)deficitHours.push(h);}
  const totalDeficitWh=deficitByH.reduce((a,v)=>a+v,0);
  const overnightHours=[];
  for(let h=0;h<24;h++){if((res.sc[h]||0)<5)overnightHours.push(h);}

  if(res.al.dep<hrs){
    const depH=res.al.dep;
    const deficitHrs=hrs-depH;
    const avgDeficitW=totalDeficitWh/24;
    const neededKwh=Math.max(0.5,Math.ceil((deficitHrs*avgDeficitW/1000)*2)/2);
    let projectedAllDep=depH;
    try{
      const ch=CHEM[rCfg.battery.chem]||CHEM.lfp;
      const biggerCap=rCfg.battery.cap+neededKwh;
      const biggerUs=biggerCap*rCfg.battery.dod;
      const socCfg={cap:biggerUs,nameplate:biggerCap,dod:rCfg.battery.dod,rte:rCfg.battery.rte,
        solar:res.sc,load:loadH,hrs:hrs,
        peukertK:ch.peukert,crCh:ch.cr,crDis:ch.cr,
        ambTemp:rCfg.zone?rCfg.zone.tmp:25,tempSlope:ch.tempSlope,
        usePeukert:true,useCRate:true,useTemp:true};
      projectedAllDep=simSOC(socCfg).dep;
    }catch(e){}
    const batCost=calcCost(0,0,neededKwh,costCfg);
    const appContrib=apps.map(a=>({
      ...a,overnightWh:a.w*(a.h/24)*overnightHours.length
    })).sort((a,b)=>b.overnightWh-a.overnightWh);
    const topApp=appContrib[0];
    recs.push({
      id:"increase-battery",severity:"critical",category:"battery",
      title:"Battery depletes before blackout ends",
      diagnosis:"Your battery reaches minimum SOC after "+depH.toFixed(1)+" hours — "+deficitHrs.toFixed(1)+" hours short of your "+hrs+"-hour blackout. Overnight deficit averages ~"+Math.round(avgDeficitW)+"W when solar drops to zero."+(topApp?", with "+topApp.name+" being the largest overnight draw at "+topApp.overnightWh.toFixed(0)+" Wh.":""),
      actions:[
        {label:"Add "+neededKwh.toFixed(1)+" kWh of battery capacity",projectedImpact:"Extends all-load survival to ~"+projectedAllDep.toFixed(0)+"h (from "+depH.toFixed(0)+"h)",effort:"high",costEstimate:batCost.total,_before:depH,_after:projectedAllDep},
        {label:"Shed non-critical loads overnight",projectedImpact:"Critical-only loads survive "+res.cl.dep.toFixed(0)+"h"+(res.cl.dep>=hrs?" — enough for full blackout":" — still "+(hrs-res.cl.dep).toFixed(0)+"h short"),effort:"low",costEstimate:0,_before:depH,_after:res.cl.dep}
      ],affectedMetric:"Depletion (All)"
    });
  }

  if(ds<dD){
    const gapWh=dD-ds;
    const panelW=rCfg.solar?rCfg.solar.w:400;
    const adjPSH=res.adjPSH||4.5;
    const additionalPanels=Math.ceil(gapWh/(panelW*adjPSH*0.86));
    if(additionalPanels>0&&additionalPanels<50){
      let projectedDep=res.al.dep;
      try{
        const ch=CHEM[rCfg.battery.chem]||CHEM.lfp;
        let newSc;
        if(ds>0){const scale=(ds+additionalPanels*panelW*adjPSH*0.86)/ds;newSc=res.sc.map(w=>w*scale);}
        else{const newDs=additionalPanels*panelW*adjPSH*0.86;const dl=seasonDaylight(res.season||"summer");newSc=solarCurve(newDs,dl.sunrise,dl.sunset).map(w=>w*0.95);}
        const socCfg={cap:res.us,nameplate:rCfg.battery.cap,dod:rCfg.battery.dod,rte:rCfg.battery.rte,solar:newSc,load:loadH,hrs:hrs,peukertK:ch.peukert,crCh:ch.cr,crDis:ch.cr,ambTemp:rCfg.zone?rCfg.zone.tmp:25,tempSlope:ch.tempSlope,usePeukert:true,useCRate:true,useTemp:true};
        projectedDep=simSOC(socCfg).dep;
      }catch(e){}
      const solCost=calcCost(additionalPanels,panelW,0,costCfg);
      recs.push({id:"increase-solar",severity:ds<dD*0.5?"critical":"warning",category:"solar",title:"Daily solar production is below demand",diagnosis:"Your panels produce "+ds.toFixed(0)+" Wh/day against "+dD.toFixed(0)+" Wh/day demand — a "+gapWh.toFixed(0)+" Wh daily shortfall that drains the battery each cycle.",actions:[{label:"Add "+additionalPanels+" panel"+(additionalPanels>1?"s":"")+" ("+((additionalPanels*panelW/1000).toFixed(1))+" kW)",projectedImpact:"Closes the "+gapWh.toFixed(0)+" Wh/day gap, extends survival to ~"+projectedDep.toFixed(0)+"h",effort:"high",costEstimate:solCost.total,_before:res.al.dep,_after:projectedDep}],affectedMetric:"Daily Solar"});
    }
  }

  if(res.od<0.92){
    const bestD=tiltD("S",30);
    const lostPct=((1-res.od/bestD)*100).toFixed(0);
    recs.push({id:"optimize-orientation",severity:"info",category:"solar",title:"Panel orientation is suboptimal",diagnosis:"Your "+(rCfg.solar?rCfg.solar.ori:"?")+"/"+(rCfg.solar?rCfg.solar.tilt:"?")+" setup achieves "+(res.od*100).toFixed(0)+"% orientation derate. South-facing at 30° would achieve "+(bestD*100).toFixed(0)+"%.",actions:[{label:"Adjust tilt to ~30° and face panels south",projectedImpact:"Could recover ~"+lostPct+"% of orientation loss",effort:"medium",costEstimate:null}],affectedMetric:"Solar Output Curve"});
  }

  if(res.al.dep<hrs){
    const schedulable=apps.filter(a=>a.p!=="Critical"&&!a.m&&a.w*a.h>50).sort((a,b)=>(b.w*b.h)-(a.w*a.h));
    if(schedulable.length>0){
      const top=schedulable[0];
      const dayl=seasonDaylight(res.season||"summer");
      const shiftWh=top.w*top.h;
      let projectedDep=res.al.dep;
      try{
        const ch=CHEM[rCfg.battery.chem]||CHEM.lfp;
        const shiftLoad=Array(24).fill(0);
        const baseHourly=dD/24;
        const appHourly=top.w*(top.h/24);
        for(let h=0;h<24;h++){if(h>=dayl.sunrise&&h<=dayl.sunset)shiftLoad[h]=baseHourly;else shiftLoad[h]=Math.max(0,baseHourly-appHourly);}
        const socCfg={cap:res.us,nameplate:rCfg.battery.cap,dod:rCfg.battery.dod,rte:rCfg.battery.rte,solar:res.sc,load:shiftLoad,hrs:hrs,peukertK:ch.peukert,crCh:ch.cr,crDis:ch.cr,ambTemp:rCfg.zone?rCfg.zone.tmp:25,tempSlope:ch.tempSlope,usePeukert:true,useCRate:true,useTemp:true};
        projectedDep=simSOC(socCfg).dep;
      }catch(e){}
      const improvement=Math.max(0,projectedDep-res.al.dep);
      recs.push({id:"load-shift-"+top.id,severity:improvement>2?"warning":"info",category:"scheduling",title:"Shift "+top.name+" to daylight hours",diagnosis:top.name+" uses "+shiftWh.toFixed(0)+" Wh/day across "+top.h+"h. Moving its runtime to "+fmtH(dayl.sunrise)+"–"+fmtH(dayl.sunset)+" reduces overnight battery draw by ~"+(shiftWh*0.5).toFixed(0)+" Wh.",actions:[{label:"Run "+top.name+" between "+fmtH(dayl.sunrise)+" and "+fmtH(dayl.sunset),projectedImpact:improvement>0.5?"Extends survival by ~"+improvement.toFixed(0)+"h (to ~"+projectedDep.toFixed(0)+"h)":"Modest improvement (~"+improvement.toFixed(1)+"h)",effort:"low",costEstimate:0,_before:res.al.dep,_after:projectedDep}],affectedMetric:"Depletion (All)"});
    }
  }

  if(dD>0&&res.al.dep<hrs){
    const highLoad=apps.filter(a=>(a.w*a.h)/dD>0.25).sort((a,b)=>(b.w*b.h)-(a.w*a.h));
    highLoad.forEach(a=>{
      const pct=((a.w*a.h/dD)*100).toFixed(0);
      recs.push({id:"reduce-"+a.id,severity:"warning",category:"appliance",title:a.name+" uses "+pct+"% of daily energy",diagnosis:a.name+" consumes "+(a.w*a.h).toFixed(0)+" Wh/day out of "+dD.toFixed(0)+" Wh total. This single appliance accounts for over a quarter of your energy budget.",actions:[{label:"Replace with efficient model or reduce to "+Math.ceil(a.h*0.7)+"h/day",projectedImpact:"Could save ~"+(a.w*a.h*0.3).toFixed(0)+" Wh/day",effort:"medium",costEstimate:null}],affectedMetric:"Load Breakdown"});
    });
  }

  if(res.cl.dep>=hrs&&res.al.dep<hrs){
    const hasBatteryRec=recs.some(r=>r.id==="increase-battery");
    if(!hasBatteryRec){
      recs.push({id:"critical-load-fallback",severity:"info",category:"scheduling",title:"Critical loads alone survive the blackout",diagnosis:"Running only critical loads extends survival to "+res.cl.dep.toFixed(0)+"h — enough for your "+hrs+"h blackout. This requires no hardware investment, just a load-shedding plan.",actions:[{label:"Create a load-shedding plan for non-critical appliances",projectedImpact:"Survives full "+hrs+"h blackout at zero cost",effort:"low",costEstimate:0,_before:res.al.dep,_after:res.cl.dep}],affectedMetric:"Depletion (Crit)"});
    }
  }

  const sevOrder={critical:0,warning:1,info:2};
  recs.sort((a,b)=>(sevOrder[a.severity]||2)-(sevOrder[b.severity]||2));
  return recs.slice(0,6);
};

const runSim=cfg=>{
  const{apps,solar:s,battery:b,zone:z,hrs,bpy,adv}=cfg;
  const tL=totalL(apps),pL=peakL(apps),dD=dailyD(apps),bP=byP(apps),bC=byC(apps);
  const season=adv.season||"summer";
  const cloud=adv.cloud||"typical";
  const noct=adv.noct||45;
  const tc=adv.tc||-0.0038;
  const invEff=adv.invEff||0.95;
  const useAdv=adv.useAdv||false;
  const subDr=adv.subDr||null;
  const td=tempD(z.tmp,800,noct,tc);
  const od=tiltD(s.ori,s.tilt);
  let ap;
  if(useAdv&&subDr)ap=arrPow(s.cnt,s.w,td,od,subDr);
  else ap=arrPowLegacy(s.cnt,s.w,td,od);
  const adjPSH=seasonalPSH(z.psh,season);
  let ds=daySolar(ap,adjPSH);
  ds=cloudAtten(ds,cloud);
  const dl=seasonDaylight(season);
  let sc=solarCurve(ds,dl.sunrise,dl.sunset);
  sc=sc.map(w=>w*invEff);
  const ch=CHEM[b.chem]||CHEM.lfp;
  const us=b.cap*b.dod;
  const lp=new Array(24).fill(dD/24);
  const socCfg={cap:us,nameplate:b.cap,dod:b.dod,rte:b.rte,solar:sc,load:lp,hrs:hrs,
    peukertK:ch.peukert,crCh:ch.cr,crDis:ch.cr,ambTemp:z.tmp,tempSlope:ch.tempSlope,
    usePeukert:adv.usePeukert!==false,useCRate:adv.useCRate!==false,useTemp:adv.useTemp!==false};
  const al=simSOC(socCfg);
  const ca=apps.filter(a=>a.p==="Critical"),cd=dailyD(ca),cl2=new Array(24).fill(cd/24);
  const cl=simSOC({...socCfg,load:cl2});
  const dg=degrad(al.dis,us,b.chem,b.dod,bpy);

  const blue=[59,130,246],red=[244,63,94];
  const r=lerp(blue[0],red[0],frac),g=lerp(blue[1],red[1],frac),b=lerp(blue[2],red[2],frac);
  const heatColor="rgb("+r+","+g+","+b+")";
  return React.createElement("input",{
    type:"range",value,min,max,onChange,"aria-label":ariaLabel,
    className:"w-full heat-slider",

}

function ParetoExplorer({front,cfg,res,selected,onSelect,onApply}){
  const[axisX,setAxisX]=useState("cost");

  const objLabels={cost:"Cost (EGP)",reliability:"Reliability",carbon:"Carbon (kg CO₂)",survival:"Survival (hrs)"};
  const w=560,h=360;
  const pad={t:30,r:30,b:50,l:65};
  const cw=w-pad.l-pad.r;const ch=h-pad.t-pad.b;
  const getX=v=>v[axisX];const getY=v=>v[axisY];
  const getSize=v=>v[sizeObj];const getColor=v=>v[colorObj];
  const xVals=front.map(getX);const yVals=front.map(getY);
  const sVals=front.map(getSize);const cVals=front.map(getColor);
  const xMin=Math.min(...xVals),xMax=Math.max(...xVals)||1;
  const yMin=Math.min(...yVals),yMax=Math.max(...yVals)||1;
  const sMin=Math.min(...sVals),sMax=Math.max(...sVals)||1;
  const cMin=Math.min(...cVals),cMax=Math.max(...cVals)||1;
  const sx=v=>pad.l+((v-xMin)/(xMax-xMin||1))*cw;
  const sy=v=>pad.t+ch-((v-yMin)/(yMax-yMin||1))*ch;
  const ss=v=>4+((v-sMin)/(sMax-sMin||1))*10;
  const colorScale=(v)=>{

function generateInsights(res,cfg){
  var insights=[],score=100;
  if(!res||!res.cfg||!res.cfg.apps||!res.cfg.apps.length)return{insights:[],score:50};
  var rCfg=res.cfg,hrs=rCfg.hrs||72,apps=rCfg.apps,dD=res.dD,ds=res.ds;
  if(dD<=0||hrs<=0)return{insights:[],score:50};

  if(res.al.dep<hrs){
    var depH=res.al.dep,deficitHrs=hrs-depH;
    score-=20;
    var costCfg={solarPerW:27.5,batPerKwh:4000,bosPct:17.5};
    var overnightHours=[];
    for(var h=0;h<24;h++){if((res.sc[h]||0)<5)overnightHours.push(h)}
    var loadH=Array(24).fill(dD/24);
    var deficitByH=loadH.map(function(l,h){return Math.max(0,l-(res.sc[h]||0))});
    var avgDeficitW=deficitByH.reduce(function(a,v){return a+v},0)/24;
    var neededKwh=Math.max(0.5,Math.ceil((deficitHrs*avgDeficitW/1000)*2)/2);
    var appContrib=apps.map(function(a){return{...a,overnightWh:a.w*(a.h/24)*overnightHours.length}}).sort(function(a,b){return b.overnightWh-a.overnightWh});
    var topApp=appContrib[0];
    var batCost=calcCost(0,0,neededKwh,costCfg);
    insights.push({id:"battery-depletion",severity:"critical",category:"battery",title:"Battery won't last the full blackout",summary:"Battery depletes after "+depH.toFixed(0)+" hours — "+deficitHrs.toFixed(0)+" hours short.",description:"Your battery reaches minimum SOC after "+depH.toFixed(1)+" hours, leaving a "+deficitHrs.toFixed(1)+"-hour gap. Overnight deficit averages ~"+Math.round(avgDeficitW)+"W when solar drops to zero."+(topApp?" Your biggest overnight drain is "+topApp.name+" at "+topApp.overnightWh.toFixed(0)+" Wh":""),impact:"-"+deficitHrs.toFixed(0)+"h",actions:[{label:"Add "+neededKwh.toFixed(1)+" kWh battery",projectedImpact:"Extends survival to ~"+depH.toFixed(0)+"h",effort:"high",costEstimate:batCost.total},{label:"Shed non-critical loads overnight",projectedImpact:"Critical-only survive "+res.cl.dep.toFixed(0)+"h",effort:"low",costEstimate:0}]});
  }

  if(ds<dD){
    var gapWh=dD-ds,panelW=rCfg.solar?rCfg.solar.w:400,adjPSH=res.adjPSH||4.5;
    var additionalPanels=Math.ceil(gapWh/(panelW*adjPSH*0.86));
    score-=15;
    if(additionalPanels>0&&additionalPanels<50){
      var solCost=calcCost(additionalPanels,panelW,0,costCfg);
      insights.push({id:"solar-shortfall",severity:ds<dD*0.5?"critical":"warning",category:"solar",title:"Solar production falls short of demand",summary:(ds/1000).toFixed(1)+" kWh/day vs "+(dD/1000).toFixed(1)+" kWh/day demand.",description:"Your panels produce "+ds.toFixed(0)+" Wh/day against "+dD.toFixed(0)+" Wh/day demand — a "+gapWh.toFixed(0)+" Wh shortfall that drains the battery each cycle.",impact:"-"+(gapWh/1000).toFixed(1)+" kWh/day",actions:[{label:"Add "+additionalPanels+" panel(s) ("+((additionalPanels*panelW/1000).toFixed(1)+" kW)"),projectedImpact:"Closes the daily gap",effort:"high",costEstimate:solCost.total}]});
    }
  }

  if(res.od<0.92){
    score-=5;
    var lostPct=((1-res.od)*100).toFixed(0);
    insights.push({id:"orientation",severity:"info",category:"solar",title:"Panel orientation could be optimized",summary:"Currently at "+(res.od*100).toFixed(0)+"% efficiency. South-facing at 30° achieves 100%.",description:"Your "+(rCfg.solar?rCfg.solar.ori:"?")+"/"+(rCfg.solar?rCfg.solar.tilt:"?")+" setup achieves "+(res.od*100).toFixed(0)+"% orientation derate. Adjusting to south at 30° would recover ~"+lostPct+"%.",impact:"+"+lostPct+"%",actions:[{label:"Adjust tilt to ~30° and face south",projectedImpact:"Recovers ~"+lostPct+"% orientation loss",effort:"medium",costEstimate:null}]});
  }

  if(dD>0){
    var highLoad=apps.filter(function(a){return(a.w*a.h)/dD>0.25}).sort(function(a,b){return(b.w*b.h)-(a.w*a.h)});
    highLoad.forEach(function(a){
      var pct=((a.w*a.h/dD)*100).toFixed(0);
      score-=5;
      insights.push({id:"high-"+a.id,severity:"warning",category:"efficiency",title:a.name+" dominates your energy budget",summary:"Uses "+pct+"% of daily energy ("+(a.w*a.h/1000).toFixed(1)+" kWh/day).",description:a.name+" consumes "+(a.w*a.h).toFixed(0)+" Wh/day out of "+dD.toFixed(0)+" Wh total — that's "+pct+"% of your energy budget.",impact:pct+"%",actions:[{label:"Replace with efficient model or reduce to "+Math.ceil(a.h*0.7)+"h/day",projectedImpact:"Could save ~"+(a.w*a.h*0.3).toFixed(0)+" Wh/day",effort:"medium",costEstimate:null}]});
    });
  }

  if(res.al.dep<hrs){
    var schedulable=apps.filter(function(a){return a.p!=="Critical"&&!a.m&&a.w*a.h>50}).sort(function(a,b){return(b.w*b.h)-(a.w*a.h)});
    if(schedulable.length>0){
      var top=schedulable[0],shiftWh=top.w*top.h;
      score+=3;
      insights.push({id:"shift-"+top.id,severity:"info",category:"schedule",title:"Shift "+top.name+" to daylight hours",summary:"Running during solar hours saves ~"+(shiftWh*0.3).toFixed(0)+" Wh battery drain.",description:top.name+" uses "+shiftWh.toFixed(0)+" Wh/day. Moving runtime to 6:00–20:00 when solar is available reduces overnight battery draw by ~"+(shiftWh*0.5).toFixed(0)+" Wh.",impact:"Free",actions:[{label:"Run "+top.name+" between 6:00 and 20:00",projectedImpact:"Reduces overnight drain by ~"+(shiftWh*0.5).toFixed(0)+" Wh",effort:"low",costEstimate:0}]});
    }
  }

  if(res.cl.dep>=hrs&&res.al.dep<hrs){
    score+=5;
    insights.push({id:"critical-only",severity:"success",category:"tip",title:"Critical loads survive the full blackout",summary:"Running only critical loads extends survival to "+res.cl.dep.toFixed(0)+"h — enough for "+hrs+"h target.",description:"Your critical loads can sustain for "+res.cl.dep.toFixed(0)+" hours. With a load-shedding plan, you survive the full blackout without hardware investment.",impact:"EGP 0",actions:[{label:"Create a load-shedding priority list",projectedImpact:"Survives full "+hrs+"h blackout at zero cost",effort:"low",costEstimate:0}]});
  }

  if(insights.length===0){
    score=95;
    insights.push({id:"system-good",severity:"success",category:"check",title:"System is well-sized for your blackout",summary:"Your "+(rCfg.solar?rCfg.solar.cnt:"")+"-panel, "+(rCfg.battery?rCfg.battery.cap:"")+"-kWh system covers the "+hrs+"h blackout.",description:"Your solar and battery are well-matched to your load. Consider re-running annually as battery degrades.",impact:"Optimal",actions:[]});
  }

  var sevOrder={critical:0,warning:1,info:2,success:3};
  insights.sort(function(a,b){return(sevOrder[a.severity]||2)-(sevOrder[b.severity]||2)});
  return{insights:insights.slice(0,8),score:Math.max(0,Math.min(100,score))};
}
